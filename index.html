<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clow Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0618 60%, #060010 100%);
      overflow: hidden;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,200,220,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,220,240,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,200,230,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 35%, rgba(255,220,240,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      perspective: 1000px;
      perspective-origin: center center;
      z-index: 1;
    }

    .card-wrapper {
      /* Tilt left while spinning */
      transform: rotate(-8deg);
      animation: tiltBob 3s ease-in-out infinite;
    }

    @keyframes tiltBob {
      0%, 100% { transform: rotate(-8deg) translateY(0px); }
      50%       { transform: rotate(-8deg) translateY(-12px); }
    }

    .card {
      width: 300px;
      height: 520px;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 5s linear infinite;
      /* drop shadow */
      filter: drop-shadow(0 30px 60px rgba(255, 100, 180, 0.35))
              drop-shadow(0 10px 30px rgba(80, 0, 120, 0.5));
    }

    @keyframes spin {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 24px;
      overflow: hidden;
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 24px;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* Gloss overlay on front */
    .card-face::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.45) 0%,
        rgba(255, 255, 255, 0.08) 30%,
        transparent 50%,
        rgba(255, 200, 230, 0.05) 70%,
        rgba(255, 255, 255, 0.15) 100%
      );
      mix-blend-mode: screen;
      animation: glossShimmer 5s linear infinite;
    }

    @keyframes glossShimmer {
      0%   { opacity: 1; background-position: -100% 0; }
      50%  { opacity: 0.3; }
      100% { opacity: 1; background-position: 200% 0; }
    }

    /* Extra holographic rainbow sheen */
    .card-face::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      background: linear-gradient(
        105deg,
        transparent 20%,
        rgba(255, 182, 193, 0.15) 30%,
        rgba(255, 218, 185, 0.12) 40%,
        rgba(216, 191, 216, 0.12) 50%,
        rgba(173, 216, 230, 0.10) 60%,
        transparent 70%
      );
      background-size: 200% 200%;
      mix-blend-mode: screen;
      animation: holo 5s linear infinite;
      z-index: 2;
    }

    @keyframes holo {
      0%   { background-position: 0% 50%; opacity: 0.6; }
      25%  { opacity: 0.2; }
      50%  { background-position: 100% 50%; opacity: 0.8; }
      75%  { opacity: 0.2; }
      100% { background-position: 0% 50%; opacity: 0.6; }
    }

    /* Ambient glow pulse around card */
    .glow-ring {
      position: absolute;
      inset: -40px;
      border-radius: 40px;
      background: radial-gradient(ellipse at center, rgba(255, 130, 180, 0.2) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card-wrapper">
      <div class="glow-ring"></div>
      <div class="card">
        <!-- Front face (viewer-facing at 0deg) -->
        <div class="card-face card-front">
          <img src="front.png" alt="Clow Card Front" />
        </div>
        <!-- Back face (viewer-facing at 180deg) -->
        <div class="card-face card-back">
          <img src="back.png" alt="Clow Card Back" />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
