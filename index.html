<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clow Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at center, #2a0a3a 0%, #0d0014 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 320px;
    height: 660px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }

  /* sparkle canvas BELOW card */
  #sparkleBelow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    width: 260px;
    height: 583px;
    perspective: 1000px;
    z-index: 1;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spin 5s linear infinite;
  }
  .card.paused { animation-play-state: paused; }

  @keyframes spin {
    from { transform: rotateY(0deg) rotateZ(-12deg); }
    to   { transform: rotateY(360deg) rotateZ(-12deg); }
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    overflow: hidden;
  }
  .face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .front-face { transform: rotateY(180deg); }

  .gloss {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.1) 25%,
      rgba(255,255,255,0) 50%,
      rgba(255,255,255,0.05) 75%,
      rgba(255,255,255,0.25) 100%
    );
  }
  .streak {
    position: absolute;
    top: -80%;
    left: -40%;
    width: 55%;
    height: 260%;
    background: linear-gradient(
      100deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.38) 50%,
      rgba(255,255,255,0) 100%
    );
    border-radius: 50%;
    pointer-events: none;
    animation: streak 3s linear infinite;
  }
  @keyframes streak {
    0%   { opacity:0; transform: translateX(-10px); }
    10%  { opacity:1; }
    40%  { opacity:0; transform: translateX(350px); }
    50%  { opacity:0; transform: translateX(-10px); }
    60%  { opacity:1; }
    90%  { opacity:0; transform: translateX(350px); }
    100% { opacity:0; }
  }

  /* sparkle canvas ABOVE card */
  #sparkleAbove {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }


  /* background twinkling stars */
  .bgstar {
    position: fixed;
    border-radius: 50%;
    background: white;
    animation: twinkle linear infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity:0; transform: scale(0.5); }
    50%      { opacity:0.6; transform: scale(1); }
  }

</style>
</head>

    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDuration = (Math.random() * 3 + 2).toFixed(1) + 's';
    s.style.animationDelay = (Math.random() * 5).toFixed(1) + 's';
    document.body.appendChild(s);
  }

  // two canvases — below and above
  const below = document.getElementById('sparkleBelow');
  const above = document.getElementById('sparkleAbove');
  const stage = document.querySelector('.stage');

  function resizeCanvases() {
    const w = stage.offsetWidth;
    const h = stage.offsetHeight;
    below.width = w; below.height = h;
    above.width = w; above.height = h;
  }
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  const ctxB = below.getContext('2d');
  const ctxA = above.getContext('2d');

  const COLORS = [
    [255, 220, 240],
    [255, 180, 255],
    [220, 160, 255],
    [255, 255, 200],
    [210, 230, 255],
    [255, 255, 255],
  ];

  // separate arrays for below and above layers
  const sparklesBelow = [];
  const sparklesAbove = [];

  function makeSparkle(layer) {
    const w = stage.offsetWidth;
    const h = stage.offsetHeight;
    const cx = w / 2;
    const cy = h / 2;
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 160 + 40;
    const col = COLORS[Math.floor(Math.random() * COLORS.length)];
    return {
      x: cx + Math.cos(angle) * dist * 0.55,
      y: cy + Math.sin(angle) * dist * 0.85,
      vx: (Math.random() - 0.5) * 1.0,
      vy: (Math.random() - 0.5) * 1.0 - 0.3,
      life: 0,
      maxLife: Math.random() * 70 + 35,
      size: layer === 'above' ? Math.random() * 7 + 3 : Math.random() * 4 + 1.5,
      r: col[0], g: col[1], b: col[2],
      type: Math.random() > 0.4 ? 'star' : 'dot',
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.18,
    };
  }

  function drawStar4(ctx, x, y, r, alpha, rotation, rc, gc, bc) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const a2 = a + Math.PI / 4;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(a2) * r * 0.28, Math.sin(a2) * r * 0.28);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.shadowColor = 'rgba(' + rc + ',' + gc + ',' + bc + ',' + alpha + ')';
    ctx.shadowBlur = r * 2.5;
    ctx.fill();
    ctx.restore();
  }

  function renderLayer(ctx, arr) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    for (let i = arr.length - 1; i >= 0; i--) {
      const sp = arr[i];
      sp.life++;
      sp.x += sp.vx;
      sp.y += sp.vy;
      sp.rotation += sp.rotSpeed;
      const p = sp.life / sp.maxLife;
      const alpha = p < 0.25 ? p / 0.25 : 1 - ((p - 0.25) / 0.75);

      if (sp.type === 'star') {
        drawStar4(ctx, sp.x, sp.y, sp.size, alpha, sp.rotation, sp.r, sp.g, sp.b);
      } else {
        ctx.save();
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, sp.size * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + sp.r + ',' + sp.g + ',' + sp.b + ',' + alpha + ')';
        ctx.shadowColor = 'rgba(' + sp.r + ',' + sp.g + ',' + sp.b + ',' + alpha + ')';
        ctx.shadowBlur = sp.size * 3;
        ctx.fill();
        ctx.restore();
      }

      if (sp.life >= sp.maxLife) arr.splice(i, 1);
    }
  }

  let paused = false;

  function loop() {
    if (!paused) {
      if (Math.random() < 0.3) sparklesBelow.push(makeSparkle('below'));
      if (Math.random() < 0.35) sparklesAbove.push(makeSparkle('above'));
    }
    renderLayer(ctxB, sparklesBelow);
    renderLayer(ctxA, sparklesAbove);
    requestAnimationFrame(loop);
  }
  loop();

  window.setSpeed = function(v) {
    document.getElementById('spd').textContent = v;
    const dur = ((11 - v) * 0.55 + 0.4).toFixed(2) + 's';
    document.getElementById('card').style.animationDuration = dur;
    document.querySelectorAll('.streak').forEach(el => el.style.animationDuration = dur);
  };

  // --- Click to pause/resume + drag to manually spin ---
  const card = document.getElementById('card');
  let isDragging = false;
  let dragStartX = 0;
  let currentRotY = 0;  // always tracks the latest known angle
  let dragMoved = false;

  function getAnimDuration() {
    return parseFloat(getComputedStyle(card).animationDuration) || 3;
  }

  function getComputedRotY() {
    const matrix = new DOMMatrixReadOnly(getComputedStyle(card).transform);
    // atan2(m13, m11) gives rotateY angle
    return Math.atan2(-matrix.m31, matrix.m11) * (180 / Math.PI);
  }

  function freezeCard() {
    currentRotY = getComputedRotY();
    card.style.animation = 'none';
    card.style.transform = `rotateY(${currentRotY}deg) rotateZ(-12deg)`;
  }

  function resumeFromCurrent() {
    const normalized = ((currentRotY % 360) + 360) % 360;
    const dur = getAnimDuration();
    const delay = -((normalized / 360) * dur);
    // Apply delay then restore animation
    card.style.transform = '';
    card.style.animationDelay = delay + 's';
    card.style.animation = `spin ${dur}s ${delay}s linear infinite`;
  }

  function enterManualMode(clientX) {
    isDragging = true;
    dragMoved = false;
    dragStartX = clientX;
    freezeCard();
    paused = true;
    card.style.cursor = 'grabbing';
  }

  function onDragMove(clientX) {
    if (!isDragging) return;
    const dx = clientX - dragStartX;
    if (Math.abs(dx) > 3) dragMoved = true;
    currentRotY += dx * 0.7;  // accumulate rotation
    dragStartX = clientX;     // use delta each frame
    card.style.transform = `rotateY(${currentRotY}deg) rotateZ(-12deg)`;
  }

  function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    card.style.cursor = 'pointer';

    if (!dragMoved) {
      // Plain click — resume auto-spin from current angle
      paused = false;
      resumeFromCurrent();
      if (document.getElementById('btn')) {
        document.getElementById('btn').textContent = '⏸ Pause';
      }
    }
    // If dragged, stay frozen until next click
  }

  // Mouse events
  card.addEventListener('mousedown', e => { e.preventDefault(); enterManualMode(e.clientX); });
  window.addEventListener('mousemove', e => onDragMove(e.clientX));
  window.addEventListener('mouseup', () => endDrag());

  // Touch events
  card.addEventListener('touchstart', e => { e.preventDefault(); enterManualMode(e.touches[0].clientX); }, { passive: false });
  window.addEventListener('touchmove', e => onDragMove(e.touches[0].clientX));
  window.addEventListener('touchend', () => endDrag());

  card.style.cursor = 'pointer';

  // Keep the existing button working too
  window.toggle = function() {
    if (isDragging) return;
    paused = !paused;
    if (paused) {
      freezeCard();
    } else {
      resumeFromCurrent();
    }
    if (document.getElementById('btn')) {
      document.getElementById('btn').textContent = paused ? '▶ Resume' : '⏸ Pause';
    }
  };
</script>
</body>
</html>
